<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>Sugerencias - Planificador UDG</title>

    <!-- Fonts and Styles -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="landing-page">
    <div class="glass-bg"></div>

    <div class="l-container">
        <header class="l-header glass">
            <a href="/" class="header-brand" style="text-decoration: none;">
                <div class="logo-wrapper">
                    <img src="{{ url_for('static', filename='assets/icon.png') }}" alt="Logo" class="header-logo">
                    <div class="logo-glow"></div>
                </div>
                <div>
                    <h1 class="header-title">Planificador<span>UDG</span></h1>
                    <p class="header-tagline">By students, for students</p>
                </div>
            </a>

            <nav class="header-nav">
                <a href="/planner" class="nav-link"><i class="fas fa-calendar-alt"></i><span>Horarios</span></a>
                <a href="/professors" class="nav-link"><i
                        class="fas fa-chalkboard-teacher"></i><span>Profesores</span></a>
            </nav>

            <div class="header-auth">
                <a href="/" class="l-btn l-btn-text">Volver</a>
            </div>
        </header>

        <main class="feedback-main">
            <section class="feedback-container glass">
                <div class="feedback-header">
                    <div class="badge-new">Sugerencias y Soporte ✨</div>
                    <h1 class="section-title">¿Cómo podemos <span>mejorar?</span></h1>
                    <p class="feedback-subtitle">Tu opinión es fundamental para hacer del Planificador UDG la mejor
                        herramienta universitaria. Cuéntanos qué piensas.</p>
                </div>

                <form id="feedback-form" class="feedback-form">
                    <div class="l-grid" style="grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label for="name">Nombre</label>
                            <input type="text" id="name" class="l-input" placeholder="Tu nombre" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Correo Electrónico</label>
                            <input type="email" id="email" class="l-input" placeholder="tu@correo.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="subject">Asunto</label>
                        <select id="subject" class="l-input" required>
                            <option value="" disabled selected>Selecciona una opción</option>
                            <option value="Sugerencia de Función">Sugerencia de Función</option>
                            <option value="Reporte de Error">Reporte de Error</option>
                            <option value="Soporte Técnico">Soporte Técnico</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="message">Mensaje</label>
                        <textarea id="message" class="l-input" rows="5" placeholder="Escribe aquí tus ideas..."
                            required></textarea>
                    </div>

                    <button type="submit" class="l-btn l-btn-large l-btn-primary" style="width: 100%;">
                        Enviar Sugerencia por Correo <i class="fas fa-paper-plane" style="margin-left: 10px;"></i>
                    </button>
                </form>
            </section>
        </main>

        <footer class="l-footer">
            <div class="footer-bottom">
                <p>&copy; 2026 Planificador UDG. Tu voz hace la diferencia.</p>
            </div>
        </footer>
    </div>

    <script>
        document.getElementById('feedback-form').addEventListener('submit', function (e) {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const subject = document.getElementById('subject').value;
            const message = document.getElementById('message').value;

            const emailBody = `Hola equipo del Planificador UDG,\n\nMi nombre es ${name}.\n\nAsunto: ${subject}\n\nMensaje:\n${message}\n\nEnviado desde la página de sugerencias.`;

            const mailtoLink = `mailto:moises.ibanez7835@alumnos.udg.mx?subject=${encodeURIComponent(subject + ' - Planificador UDG')}&body=${encodeURIComponent(emailBody)}`;

            window.location.href = mailtoLink;
        });
    </script>
</body>

</html>
